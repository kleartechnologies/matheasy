# gen_l10n config — generates AppLocalizations from lib/l10n/app_*.arb.
# The learner's AppLanguage picks the locale; adding a language = add app_<code>.arb.
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
# Nullable so `context.l10n` can fall back to English when the delegate isn't in
# the tree (widget tests pump a bare MaterialApp) — see L10nExtension.
nullable-getter: true
