# Static analysis configuration for Matheasy.
#
# Runs `package:flutter_lints` plus a small set of production-grade rules, with
# stricter type checking. Generated files (*.g.dart) are excluded from linting.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat missing awaits and dead code as errors, not warnings.
    unawaited_futures: error
    invalid_annotation_target: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_redundant_argument_values
    - directives_ordering
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_final_locals
    - prefer_single_quotes
    - require_trailing_commas
    - sort_child_properties_last
    - unnecessary_parenthesis
    - use_super_parameters
